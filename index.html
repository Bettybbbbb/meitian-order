<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美天早餐 - 線上點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-btn.active { border-bottom: 3px solid #ea580c; color: #ea580c; font-weight: 900; }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-screen overflow-hidden text-gray-800">
    <div class="w-full max-w-md bg-white h-full flex flex-col relative shadow-2xl">
        
        <header class="bg-orange-500 text-white p-4 shrink-0 shadow-md flex justify-between items-center z-20">
            <div>
                <h1 class="text-xl font-black italic">美天早餐</h1>
                <p class="text-xs text-orange-100">延吉店專屬點餐</p>
            </div>
            <button onclick="toggleCart()" class="bg-white text-orange-600 px-4 py-2 rounded-full font-black shadow-lg">
                🛒 <span id="cart-count">0</span>
            </button>
        </header>

        <div id="nav-bar" class="flex overflow-x-auto p-2 bg-orange-50 gap-4 hide-scrollbar shrink-0 border-b sticky top-0 z-10 whitespace-nowrap">
            </div>

        <div id="menu-box" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32">
            </div>

        <div id="option-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex-col justify-end">
            <div class="bg-white rounded-t-3xl w-full max-w-md mx-auto h-[80vh] flex flex-col modal-enter shadow-2xl">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-3xl shrink-0">
                    <div>
                        <h2 id="modal-title" class="text-xl font-bold text-gray-800">餐點名稱</h2>
                        <p class="text-orange-600 font-bold text-lg">$<span id="modal-base-price">0</span></p>
                    </div>
                    <button onclick="closeModal()" class="bg-gray-200 text-gray-600 w-8 h-8 rounded-full font-bold">✕</button>
                </div>
                
                <div id="modal-dynamic-options" class="flex-1 overflow-y-auto p-5 space-y-5 bg-white">
                    </div>

                <div class="p-4 border-t bg-gray-50 shrink-0">
                    <div class="mb-3">
                        <input type="text" id="modal-note" placeholder="其他備註 (如：去洋蔥、蛋全熟)" class="w-full border p-3 rounded-xl focus:border-orange-500 outline-none">
                    </div>
                    <button onclick="addToCart()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-black text-lg shadow-lg flex justify-between px-6">
                        <span>加入購物車</span>
                        <span>小計 $<span id="modal-calc-price">0</span></span>
                    </button>
                </div>
            </div>
        </div>

        <div id="cart-drawer" class="fixed inset-0 bg-black/60 z-50 hidden flex-col justify-end">
            <div class="bg-white rounded-t-3xl w-full max-w-md mx-auto h-[75vh] flex flex-col modal-enter">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-3xl">
                    <h2 class="text-xl font-bold text-gray-800">🛒 結帳清單</h2>
                    <button onclick="toggleCart()" class="bg-gray-200 text-gray-600 w-8 h-8 rounded-full font-bold">✕</button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-100"></div>
                <div class="p-5 border-t bg-white shrink-0">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-gray-600 font-bold">總計</span>
                        <span class="text-3xl font-black text-red-600">$<span id="cart-total">0</span></span>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="order-table" placeholder="桌號" class="w-1/4 border-2 p-3 rounded-xl text-center font-bold">
                        <input type="text" id="order-name" placeholder="您的稱呼" class="w-3/4 border-2 p-3 rounded-xl">
                    </div>
                    <button onclick="submitOrder()" class="w-full bg-red-500 text-white py-4 rounded-xl font-black text-lg shadow-lg">確認送出訂單 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 飲料基本資料庫 (供單點與套餐換購計算使用，中杯基準價20元)
        const drinkList = [
            {n:"紅茶", pm:20, pl:25}, {n:"奶茶", pm:25, pl:30}, {n:"鮮奶茶", pm:40, pl:50}, {n:"豆漿", pm:25, pl:30},
            {n:"柳橙汁", pm:30, pl:35}, {n:"薏仁漿", pm:30, pl:35}, {n:"米漿", pm:25, pl:30}, {n:"拿鐵咖啡", pm:55, pl:65},
            {n:"研磨咖啡", pm:45, pl:55}, {n:"巧克力牛奶", pm:40, pl:50}, {n:"玉米濃湯", pm:35, pl:45}, {n:"鹹豆漿", pm:30, pl:30},
            {n:"檸檬紅茶", pm:25, pl:30}, {n:"百香果汁", pm:30, pl:35}, {n:"茉莉綠茶", pm:20, pl:25}, {n:"可樂", pm:25, pl:30}
        ];
        const jamFlavors = ["草莓", "巧克力", "花生", "奶酥", "香蒜", "奶油", "椰香"];
        const breadMeats = ["里肌豬排","卡拉雞腿","嫩煎雞肉","牛肉培根","香雞排","菲力雞排","鮪魚","培根","燻雞","薯餅","鮮蔬","肉排","起司","火腿","玉米","肉鬆","煎蛋"];

        // 菜單結構 (嚴格遵守老闆數量要求)
        const menuData = [
            { cat: "吐司", type: "bread", items: breadMeats.map(m => ({ n: m+"吐司", p: 40 })) }, // 17種
            { cat: "漢堡", type: "bread", items: breadMeats.map(m => ({ n: m+"堡", p: 45 })) }, // 17種
            { cat: "軟法", type: "bread", items: breadMeats.slice(0, 16).map(m => ({ n: m+"軟法", p: 55 })) }, // 16種
            { cat: "總匯", type: "bread", items: ["招牌","里肌豬排","卡拉雞腿","燻雞","鮪魚","香雞排"].map(m => ({ n: m+"總匯", p: 70 })) }, // 6種
            { cat: "蛋餅", type: "omelet", items: ["原味","玉米","起司","火腿","肉鬆","培根","鮪魚","薯餅","豬排","卡拉","燻雞","肉排","熱狗","蔬菜","九層塔","香菜","肉燥","高麗菜"].map(m => ({ n: m+"蛋餅", p: 35 })) }, // 18種
            { cat: "套餐", type: "combo", items: [{n:"1號餐(主餐+飲)", p:85}, {n:"2號餐(麵+肉+飲)", p:105}, {n:"3號餐(餅+糕+飲)", p:95}, {n:"4號餐(兒童餐)", p:65}] }, // 4種
            { cat: "果醬吐司", type: "jam", items: [...jamFlavors.map(f => ({ n: f+"吐司", p: 20 })), { n: "雙色果醬厚片", p: 35, isTwoColor: true }] }, // 7+1種
            { cat: "乳酪餅", type: "flatbread", items: [...jamFlavors.map(f => ({ n: f+"乳酪餅", p: 35 })), ...["肉排","培根","鮪魚","燻雞","火腿","玉米","肉鬆"].map(m => ({ n: m+"乳酪餅", p: 45 }))] }, // 14種
            { cat: "鐵板麵", type: "noodle", items: ["黑胡椒","蘑菇","義大利肉醬","沙茶","宮保雞丁","打拋豬肉"].map(m => ({ n: m+"鐵板麵", p: 50 })) }, // 6種
            { cat: "小點", type: "snack", items: [{n:"手工蘿蔔糕", p:35}, {n:"薯條", p:30}, {n:"雞塊(5塊)", p:35}, {n:"熱狗(3支)", p:25}, {n:"薯餅", p:20}, {n:"雞米花", p:40}, {n:"洋蔥圈", p:35}, {n:"小熱狗(5支)", p:25}, {n:"甜不辣", p:30}, {n:"花枝丸", p:35}, {n:"蔥抓餅", p:35}, {n:"蔥餅加蛋", p:45}, {n:"地瓜球", p:35}, {n:"銀絲卷", p:30}, {n:"起司條", p:40}, {n:"德式香腸", p:35}] }, // 16種
            { cat: "中式輕食", type: "chinese", items: [{n:"煎餃(8顆)", p:40}, {n:"小籠包(6顆)", p:50}, {n:"燒餅蛋", p:35}, {n:"飯糰蛋", p:45}, {n:"鹹豆漿", p:30}, {n:"荷包蛋", p:15}, {n:"蔥蛋", p:20}] }, // 7種
            { cat: "飲料", type: "drink", items: drinkList.map(d => ({ n: d.n, p: d.pm, pl: d.pl })) } // 16種
        ];

        let cart = [];
        let curItem = null;
        let basePrice = 0;

        // 初始化渲染
        function init() {
            const nav = document.getElementById('nav-bar');
            const menuBox = document.getElementById('menu-box');
            
            menuData.forEach((section, idx) => {
                // 生成導航
                const btn = document.createElement('button');
                btn.className = `nav-btn px-3 py-2 text-sm text-gray-500 font-bold transition-all ${idx === 0 ? 'active' : ''}`;
                btn.innerText = section.cat;
                btn.onclick = () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`cat-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                nav.appendChild(btn);

                // 生成菜單列表
                const secDiv = document.createElement('div');
                secDiv.id = `cat-${idx}`;
                secDiv.className = "pt-2";
                secDiv.innerHTML = `<h2 class="text-lg font-black mb-3 border-l-4 border-orange-500 pl-2 text-gray-800">${section.cat}</h2>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 gap-2";

                section.items.forEach(item => {
                    const priceText = section.type === 'drink' ? `$${item.p}起` : `$${item.p}`;
                    grid.innerHTML += `
                        <div onclick='openModal(${JSON.stringify(item)}, "${section.type}")' class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center active:scale-95 transition-transform cursor-pointer">
                            <span class="font-bold text-gray-700">${item.n}</span>
                            <span class="text-orange-600 font-black text-lg">${priceText} <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-full ml-1">+</span></span>
                        </div>`;
                });
                secDiv.appendChild(grid);
                menuBox.appendChild(secDiv);
            });
        }

        // 動態客製化彈窗
        function openModal(item, type) {
            curItem = item;
            basePrice = item.p;
            document.getElementById('modal-title').innerText = item.n;
            document.getElementById('modal-base-price').innerText = basePrice;
            document.getElementById('modal-calc-price').innerText = basePrice;
            document.getElementById('modal-note').value = '';
            
            const dyn = document.getElementById('modal-dynamic-options');
            dyn.innerHTML = '';

            // 加蛋/加起司 (麵包/軟法/總匯/鐵板麵)
            if (['bread', 'flatbread', 'noodle'].includes(type)) {
                dyn.innerHTML += `
                    <div><p class="font-bold text-gray-500 text-sm mb-2">加料區</p>
                    <div class="flex gap-2">
                        <label class="flex-1 border p-3 rounded-xl text-center font-bold relative"><input type="checkbox" class="opt-addon w-4 h-4 mr-1 accent-orange-500" value="15" data-name="加蛋">加蛋 +$15</label>
                        <label class="flex-1 border p-3 rounded-xl text-center font-bold relative"><input type="checkbox" class="opt-addon w-4 h-4 mr-1 accent-orange-500" value="15" data-name="加起司">加起司 +$15</label>
                    </div></div>`;
            }

            // 蛋餅醬料
            if (type === 'omelet') {
                dyn.innerHTML += `
                    <div><p class="font-bold text-gray-500 text-sm mb-2">選擇醬料</p>
                    <div class="flex gap-2 text-sm">
                        <label class="flex-1 border p-2 rounded-xl text-center font-bold bg-orange-50 border-orange-500"><input type="radio" name="sauce" value="醬油膏" checked class="hidden">醬油膏</label>
                        <label class="flex-1 border p-2 rounded-xl text-center font-bold"><input type="radio" name="sauce" value="辣椒醬" class="hidden">辣椒醬</label>
                        <label class="flex-1 border p-2 rounded-xl text-center font-bold"><input type="radio" name="sauce" value="不加醬" class="hidden">不加醬</label>
                    </div></div>`;
            }

            // 飲料尺寸與溫冷
            if (type === 'drink') {
                dyn.innerHTML += `
                    <div><p class="font-bold text-gray-500 text-sm mb-2">選擇大小</p>
                    <div class="flex gap-2">
                        <label class="flex-1 border p-3 rounded-xl text-center font-bold bg-orange-50 border-orange-500"><input type="radio" name="d_size" value="0" data-name="中杯" checked class="hidden">中杯 ($${item.p})</label>
                        <label class="flex-1 border p-3 rounded-xl text-center font-bold"><input type="radio" name="d_size" value="${item.pl - item.p}" data-name="大杯" class="hidden">大杯 ($${item.pl})</label>
                    </div></div>
                    <div><p class="font-bold text-gray-500 text-sm mb-2 mt-4">冰熱甜度 (直接選)</p>
                    <select id="drink-temp" class="w-full border p-3 rounded-xl font-bold bg-gray-50 outline-none">
                        <option value="冰(正常冰)">冰 (正常冰)</option><option value="少冰">少冰</option><option value="去冰">去冰</option><option value="溫">溫</option><option value="熱">熱</option>
                    </select></div>`;
            }

            // 套餐飲料換購 (16種飲料x2種尺寸，預設中紅茶+0元)
            if (type === 'combo') {
                let opts = '';
                drinkList.forEach(d => {
                    let diffM = d.pm - 20; let diffL = d.pl - 20;
                    opts += `<option value="${d.n}(中)|${diffM}">${d.n}(中) ${diffM>0?'+'+diffM:'+0'}元</option>`;
                    opts += `<option value="${d.n}(大)|${diffL}">${d.n}(大) ${diffL>0?'+'+diffL:'+0'}元</option>`;
                });
                dyn.innerHTML += `
                    <div><p class="font-bold text-orange-600 text-sm mb-2">✦ 套餐飲料換購</p>
                    <select id="combo-drink" class="w-full border p-3 rounded-xl font-bold bg-orange-50 border-orange-200 outline-none">
                        ${opts}
                    </select>
                    <select id="combo-temp" class="w-full border p-3 rounded-xl font-bold bg-gray-50 outline-none mt-2">
                        <option value="冰">冰</option><option value="溫">溫</option><option value="熱">熱</option>
                    </select></div>`;
            }

            // 果醬薄片厚片
            if (type === 'jam' && !item.isTwoColor) {
                dyn.innerHTML += `
                    <div class="flex gap-2">
                        <label class="flex-1 border p-3 rounded-xl text-center font-bold bg-orange-50 border-orange-500"><input type="radio" name="j_type" value="薄片" checked class="hidden">薄片</label>
                        <label class="flex-1 border p-3 rounded-xl text-center font-bold"><input type="radio" name="j_type" value="厚片" class="hidden">厚片</label>
                    </div>`;
            }

            // 雙色果醬專屬 7選2
            if (item.isTwoColor) {
                let jamOpts = jamFlavors.map(f => `<option value="${f}">${f}</option>`).join('');
                dyn.innerHTML += `
                    <div><p class="font-bold text-gray-500 text-sm mb-2">選擇兩種口味</p>
                    <div class="flex gap-2">
                        <select id="jam1" class="flex-1 border p-3 rounded-xl bg-gray-50 font-bold">${jamOpts}</select>
                        <select id="jam2" class="flex-1 border p-3 rounded-xl bg-gray-50 font-bold">${jamOpts.replace('巧克力', '巧克力" selected"')}</select>
                    </div></div>`;
            }

            // 監聽變更以計算價格與UI
            dyn.addEventListener('change', calcPrice);
            dyn.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    let name = e.target.name;
                    document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                        r.parentElement.classList.remove('bg-orange-50', 'border-orange-500');
                    });
                    e.target.parentElement.classList.add('bg-orange-50', 'border-orange-500');
                });
            });

            document.getElementById('option-modal').classList.remove('hidden');
            document.getElementById('option-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('option-modal').classList.add('hidden');
            document.getElementById('option-modal').classList.remove('flex');
        }

        function calcPrice() {
            let addPrice = 0;
            document.querySelectorAll('.opt-addon:checked').forEach(cb => addPrice += parseInt(cb.value));
            let dSize = document.querySelector('input[name="d_size"]:checked');
            if (dSize) addPrice += parseInt(dSize.value);
            let comboDrink = document.getElementById('combo-drink');
            if (comboDrink) addPrice += parseInt(comboDrink.value.split('|')[1]);
            
            document.getElementById('modal-calc-price').innerText = basePrice + addPrice;
        }

        function addToCart() {
            let finalPrice = parseInt(document.getElementById('modal-calc-price').innerText);
            let details = [];
            
            // 抓取各項設定
            document.querySelectorAll('.opt-addon:checked').forEach(cb => details.push(cb.getAttribute('data-name')));
            let sauce = document.querySelector('input[name="sauce"]:checked'); if (sauce) details.push(sauce.value);
            let dSize = document.querySelector('input[name="d_size"]:checked'); if (dSize) details.push(dSize.getAttribute('data-name'));
            let dTemp = document.getElementById('drink-temp'); if (dTemp) details.push(dTemp.value);
            let jType = document.querySelector('input[name="j_type"]:checked'); if (jType) details.push(jType.value);
            
            let comboDrink = document.getElementById('combo-drink');
            let comboTemp = document.getElementById('combo-temp');
            if (comboDrink) details.push(`換購:${comboDrink.value.split('|')[0]}[${comboTemp.value}]`);

            let jam1 = document.getElementById('jam1'); let jam2 = document.getElementById('jam2');
            if (jam1 && jam2) details.push(`(${jam1.value}+${jam2.value})`);

            let note = document.getElementById('modal-note').value;
            if (note) details.push(`備註:${note}`);

            cart.push({ n: curItem.n, p: finalPrice, d: details.join(' / ') });
            updateCart();
            closeModal();
            
            // 加入動畫
            const countBtn = document.getElementById('cart-count');
            countBtn.classList.add('scale-150', 'bg-white', 'text-orange-600');
            setTimeout(() => countBtn.classList.remove('scale-150', 'bg-white', 'text-orange-600'), 300);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach((item, idx) => {
                total += item.p;
                itemsDiv.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                        <div>
                            <div class="font-bold text-gray-800">${item.n}</div>
                            <div class="text-xs text-orange-600 font-bold mt-1">${item.d}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-black text-lg">$${item.p}</span>
                            <button onclick="removeCart(${idx})" class="bg-red-100 text-red-500 px-2 py-1 rounded font-bold text-sm">刪除</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = total;
        }

        function removeCart(idx) { cart.splice(idx, 1); updateCart(); }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            if (drawer.classList.contains('hidden')) {
                drawer.classList.remove('hidden'); drawer.classList.add('flex');
            } else {
                drawer.classList.add('hidden'); drawer.classList.remove('flex');
            }
        }

        // Firebase 訂單發送
        const firebaseConfig = { apiKey: "AIzaSyBg6_9BpcXndrwKL0l1jcp5kYdk8qza-4Q", databaseURL: "https://test-7c0ce-default-rtdb.firebaseio.com", projectId: "test-7c0ce" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function submitOrder() {
            const name = document.getElementById('order-name').value;
            const table = document.getElementById('order-table').value;
            if (!name) return alert("請填寫您的稱呼！");
            if (cart.length === 0) return alert("購物車是空的喔！");

            database.ref('orders').push({
                customer: name, table: table || "外帶", items: cart,
                total: parseInt(document.getElementById('cart-total').innerText),
                time: new Date().toLocaleString()
            }).then(() => {
                alert("🎉 訂單成功送出！請稍候餐點。");
                location.reload();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
