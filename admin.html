<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美天早餐 - 接單大螢幕 (數量優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* 💡 讓新訂單像外送平台一樣閃爍，提醒老闆接單 */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .new-order-flash { animation: pulse-red 1.5s infinite; border-color: #ef4444 !important; border-width: 4px; }
        
        /* 🖨️ 列印預留區 (未來給飛鵝雲端排版參考用) */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans" onclick="enableAudio()">
    <div id="print-area" class="hidden text-black p-4" style="width: 58mm; font-family: sans-serif;">
        <h2 style="font-size: 22px; border-bottom: 2px solid black;">#<span id="p-no"></span> <span id="p-method"></span></h2>
        <p id="p-time" style="font-size: 18px; font-weight: bold; margin: 5px 0;"></p>
        <div id="p-items" style="border-top: 1px dashed black; padding-top: 5px;"></div>
    </div>

    <div class="max-w-6xl mx-auto p-4 lg:p-8">
        <header class="flex justify-between items-end mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-black text-orange-500 mb-2">美天早餐 接單系統</h1>
                <p id="today-date-display" class="text-slate-400 font-bold text-lg"></p>
                <p id="audio-status" class="text-red-500 text-xs font-bold mt-1">⚠️ 請點擊畫面啟用訂單鈴聲</p>
            </div>
            <div class="text-right">
                <p class="text-slate-400 text-sm mb-1 uppercase tracking-widest">今日總營收</p>
                <p class="text-5xl font-black text-green-400 leading-none">$<span id="daily-total">0</span></p>
            </div>
        </header>

        <div id="order-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div class="text-center py-20 col-span-full text-slate-600 font
